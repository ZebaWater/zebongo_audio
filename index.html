<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeBongo Audio Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a0f;
  --bg-panel:  #111118;
  --bg-row:    #0f0f16;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.18);
  --text:      #e8e8f0;
  --text-dim:  rgba(232,232,240,0.45);
  --text-faint:rgba(232,232,240,0.22);
  --accent:    #FFE566;
  --ok:        #88FF99;
  --err:       #FF4D6D;
  --warn:      #FFB347;
  --lane-0: #FF4D6D; --lane-1: #FFB347; --lane-2: #4DC4FF; --lane-3: #B47DFF;
  --font-d: 'Black Ops One', cursive;
  --font-m: 'Share Tech Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font-m); -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,77,109,0.025)  0px,  rgba(255,77,109,0.025)  1px,  transparent 1px,  transparent 25%,
    rgba(255,179,71,0.025)  25%,  rgba(255,179,71,0.025)  calc(25% + 1px), transparent calc(25% + 1px), transparent 50%,
    rgba(77,196,255,0.025)  50%,  rgba(77,196,255,0.025)  calc(50% + 1px), transparent calc(50% + 1px), transparent 75%,
    rgba(180,125,255,0.025) 75%,  rgba(180,125,255,0.025) calc(75% + 1px), transparent calc(75% + 1px), transparent 100%
  );
}
body::after {
  content: '';
  position: fixed; bottom: 0; left: 0; right: 0; height: 35%;
  background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
  pointer-events: none; z-index: 0;
}
.page {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto; padding: 0 20px 80px;
}
header {
  padding: 48px 0 36px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
}
.logo { font-family: var(--font-d); font-size: 42px; letter-spacing: 3px; line-height: 1; margin-bottom: 4px; }
.logo span { color: var(--accent); }
.logo-sub { font-size: 10px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 24px; }
.header-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.file-count { font-size: 11px; letter-spacing: 2px; color: var(--text-dim); white-space: nowrap; }
.file-count span { color: var(--accent); }
.search-wrap { flex: 1; min-width: 180px; max-width: 340px; position: relative; }
.search-wrap::before {
  content: '⌕'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 16px; pointer-events: none;
}
#search {
  width: 100%; height: 34px; padding: 0 10px 0 32px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font-m); font-size: 12px; outline: none;
  transition: border-color .15s;
}
#search:focus { border-color: var(--border-hi); }
#search::placeholder { color: var(--text-faint); }
.btn {
  height: 34px; padding: 0 14px; background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-family: var(--font-m); font-size: 11px;
  letter-spacing: 2px; cursor: pointer; transition: border-color .15s, color .15s; white-space: nowrap;
}
.btn:hover { border-color: var(--border-hi); color: var(--text); }
.state-msg {
  display: flex; align-items: center; gap: 12px;
  padding: 40px 0; font-size: 12px; letter-spacing: 2px; color: var(--text-dim);
}
.state-msg.err { color: var(--err); }
.spinner {
  width: 16px; height: 16px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* meta warning banner */
#meta-warning {
  display: none; background: rgba(255,179,71,0.05);
  border: 1px solid rgba(255,179,71,0.2); padding: 12px 16px; margin-bottom: 16px;
  font-size: 11px; letter-spacing: 1.5px; color: var(--warn);
  align-items: center; gap: 12px; flex-wrap: wrap;
}
#meta-warning.visible { display: flex; }
#meta-warning .warn-detail { color: var(--text-dim); font-size: 10px; letter-spacing: 1px; }

#file-list { display: flex; flex-direction: column; gap: 2px; }

.file-row {
  display: grid; grid-template-columns: auto 1fr auto auto;
  align-items: center; gap: 10px; padding: 10px 14px;
  background: var(--bg-row); border: 1px solid var(--border);
  transition: border-color .12s, background .12s; animation: rowIn .2s ease both;
}
.file-row:hover { border-color: var(--border-hi); background: rgba(255,255,255,0.02); }
@keyframes rowIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.file-row:nth-child(4n+1) { border-left: 2px solid var(--lane-0); }
.file-row:nth-child(4n+2) { border-left: 2px solid var(--lane-1); }
.file-row:nth-child(4n+3) { border-left: 2px solid var(--lane-2); }
.file-row:nth-child(4n+4) { border-left: 2px solid var(--lane-3); }
.file-row.needs-meta { border-left-color: var(--warn) !important; }

.play-btn {
  width: 30px; height: 30px; flex-shrink: 0; background: none;
  border: 1px solid var(--border); color: var(--text-dim); font-size: 11px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .12s; padding: 0;
}
.play-btn:hover { border-color: var(--ok); color: var(--ok); }
.play-btn.playing { border-color: var(--ok); color: var(--ok); background: rgba(136,255,153,0.08); }
.play-btn.loading { border-color: var(--text-dim); color: var(--text-dim); cursor: wait; }

.track-info { min-width: 0; }
.track-title {
  font-size: 13px; letter-spacing: 0.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-title .ext { color: var(--text-faint); }
.track-artist { font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.needs-meta-badge { font-size: 9px; letter-spacing: 2px; color: var(--warn); margin-top: 2px; display: none; }
.needs-meta .needs-meta-badge { display: block; }
.needs-meta .track-title { opacity: 0.55; }

.file-size { font-size: 10px; letter-spacing: 1px; color: var(--text-faint); white-space: nowrap; }

.copy-btn {
  height: 28px; padding: 0 12px; background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-family: var(--font-m); font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer; white-space: nowrap;
  flex-shrink: 0; transition: background .12s, color .12s, border-color .12s;
}
.copy-btn:hover { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
.copy-btn.copied { background: var(--ok); color: #0a0a0f; border-color: var(--ok); pointer-events: none; }

.no-match { padding: 40px 0; font-size: 11px; letter-spacing: 3px; color: var(--text-faint); text-transform: uppercase; }

#now-playing {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: var(--bg-panel); border-top: 1px solid var(--border-hi);
  padding: 10px 24px; display: none; align-items: center; gap: 14px;
  font-size: 11px; letter-spacing: 2px;
}
#now-playing.visible { display: flex; }
.np-label { color: var(--text-faint); white-space: nowrap; }
.np-title { color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-stop {
  height: 28px; padding: 0 12px; background: none; border: 1px solid var(--border);
  color: var(--err); font-family: var(--font-m); font-size: 10px;
  letter-spacing: 2px; cursor: pointer; flex-shrink: 0; transition: background .12s;
}
.np-stop:hover { background: rgba(255,77,109,0.1); border-color: var(--err); }

#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--bg-panel); border: 1px solid var(--border-hi);
  padding: 10px 20px; font-size: 11px; letter-spacing: 2px;
  color: var(--ok); opacity: 0; pointer-events: none;
  transition: opacity .2s, transform .2s; z-index: 100; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">Ze<span>Bongo</span></div>
    <div class="logo-sub">Audio Library</div>
    <div class="header-meta">
      <div class="file-count" id="count">Loading…</div>
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Filter by title, artist, filename…" autocomplete="off">
      </div>
      <button class="btn" id="btn-refresh">↺ Refresh</button>
    </div>
  </header>

  <div id="meta-warning">
    <strong>⚠ <span id="warn-count"></span> TRACK(S) MISSING METADATA</strong>
    <span class="warn-detail">Add entries to meta.json in the repo root to set their title &amp; artist.</span>
  </div>

  <div id="status" class="state-msg">
    <div class="spinner"></div>
    <span>Fetching audio files…</span>
  </div>

  <div id="file-list"></div>
</div>

<div id="now-playing">
  <span class="np-label">NOW PLAYING</span>
  <span class="np-title" id="np-title">—</span>
  <button class="np-stop" id="np-stop">■ Stop</button>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const OWNER     = 'ZebaWater';
const REPO      = 'zebongo_audio';
const BRANCH    = 'main';
const FOLDER    = 'audio';
const META_FILE = 'meta.json';   // lives at repo root

const API_URL  = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}?ref=${BRANCH}`;
const META_URL = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${META_FILE}`;
const RAW_BASE = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${FOLDER}/`;
// ─────────────────────────────────────────────────────────────────────────────

let allFiles = [];
let meta     = {};

const statusEl    = document.getElementById('status');
const listEl      = document.getElementById('file-list');
const countEl     = document.getElementById('count');
const searchEl    = document.getElementById('search');
const toastEl     = document.getElementById('toast');
const metaWarning = document.getElementById('meta-warning');
const warnCount   = document.getElementById('warn-count');
const nowPlaying  = document.getElementById('now-playing');
const npTitle     = document.getElementById('np-title');
const npStop      = document.getElementById('np-stop');

let currentAudio   = null;
let currentPlayBtn = null;
let toastTimer;

async function init() {
  statusEl.className = 'state-msg';
  statusEl.innerHTML = '<div class="spinner"></div><span>Fetching audio files…</span>';
  statusEl.style.display = 'flex';
  listEl.innerHTML = '';
  countEl.textContent = 'Loading…';
  metaWarning.classList.remove('visible');

  try {
    // Fetch file list and meta.json in parallel
    const [filesRes, metaRes] = await Promise.all([
      fetch(API_URL),
      fetch(META_URL + '?t=' + Date.now()) // cache-bust so edits show immediately on refresh
    ]);

    if (!filesRes.ok) {
      if (filesRes.status === 404)
        throw new Error(`Audio folder not found — check that /${FOLDER} exists on branch "${BRANCH}".`);
      throw new Error(`GitHub API error ${filesRes.status}`);
    }

    const filesData = await filesRes.json();
    allFiles = filesData
      .filter(f => f.type === 'file' && /\.mp3$/i.test(f.name))
      .sort((a, b) => a.name.localeCompare(b.name));

    // meta.json is optional — silently fall back to empty if missing or broken
    meta = {};
    if (metaRes.ok) {
      try { meta = await metaRes.json(); } catch { /* malformed JSON, ignore */ }
    }

    statusEl.style.display = 'none';
    render();
  } catch (e) {
    statusEl.className = 'state-msg err';
    statusEl.innerHTML = `<span>⚠ ${esc(e.message)}</span>`;
  }
}

function render() {
  const q = searchEl.value.trim().toLowerCase();

  const shown = q
    ? allFiles.filter(f => {
        const m = meta[f.name] || {};
        return f.name.toLowerCase().includes(q)
          || (m.title  || '').toLowerCase().includes(q)
          || (m.artist || '').toLowerCase().includes(q);
      })
    : allFiles;

  const needsCount = allFiles.filter(f => !meta[f.name]?.title).length;
  countEl.innerHTML = `<span>${allFiles.length}</span> MP3${allFiles.length !== 1 ? 's' : ''}`;

  if (needsCount > 0) {
    warnCount.textContent = needsCount;
    metaWarning.classList.add('visible');
  } else {
    metaWarning.classList.remove('visible');
  }

  listEl.innerHTML = '';

  if (!shown.length) {
    listEl.innerHTML = `<div class="no-match">No tracks match "${esc(q)}"</div>`;
    return;
  }

  shown.forEach((f, i) => {
    const rawUrl      = RAW_BASE + encodeURIComponent(f.name);
    const m           = meta[f.name] || {};
    const hasTitle    = !!m.title;
    const nameNoExt   = f.name.replace(/\.mp3$/i, '');
    const displayTitle  = m.title  || nameNoExt;
    const displayArtist = m.artist || '';

    const row = document.createElement('div');
    row.className = 'file-row' + (hasTitle ? '' : ' needs-meta');
    row.style.animationDelay = `${Math.min(i, 30) * 18}ms`;

    row.innerHTML = `
      <button class="play-btn" title="Preview">
        <span>▶</span>
      </button>
      <div class="track-info">
        <div class="track-title">${esc(displayTitle)}${hasTitle ? '' : '<span class="ext">.mp3</span>'}</div>
        ${displayArtist ? `<div class="track-artist">${esc(displayArtist)}</div>` : ''}
        ${!hasTitle ? '<div class="needs-meta-badge">⚠ NO METADATA IN meta.json</div>' : ''}
      </div>
      <div class="file-size">${formatBytes(f.size)}</div>
      <button class="copy-btn" data-url="${esc(rawUrl)}">Copy URL</button>
    `;

    row.querySelector('.play-btn').addEventListener('click', e => {
      togglePlay(e.currentTarget, rawUrl, displayTitle);
    });

    row.querySelector('.copy-btn').addEventListener('click', e => {
      navigator.clipboard.writeText(e.currentTarget.dataset.url)
        .then(() => {
          e.currentTarget.textContent = '✓ Copied';
          e.currentTarget.classList.add('copied');
          setTimeout(() => {
            e.currentTarget.textContent = 'Copy URL';
            e.currentTarget.classList.remove('copied');
          }, 1800);
          showToast('URL copied to clipboard');
        })
        .catch(() => prompt('Copy this URL:', e.currentTarget.dataset.url));
    });

    listEl.appendChild(row);
  });
}

// ── Audio ─────────────────────────────────────────────────────────────────────
function togglePlay(btn, url, title) {
  if (currentPlayBtn === btn) { stopAudio(); return; }
  stopAudio();

  btn.classList.add('loading');
  btn.querySelector('span').textContent = '…';

  currentAudio   = new Audio(url);
  currentPlayBtn = btn;

  currentAudio.addEventListener('canplay', () => {
    if (!currentAudio) return;
    currentAudio.play();
    btn.classList.remove('loading');
    btn.classList.add('playing');
    btn.querySelector('span').textContent = '■';
    npTitle.textContent = title;
    nowPlaying.classList.add('visible');
  }, { once: true });

  currentAudio.addEventListener('ended', stopAudio);
  currentAudio.addEventListener('error', () => { stopAudio(); showToast('Could not load audio'); });
  currentAudio.load();
}

function stopAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
  if (currentPlayBtn) {
    currentPlayBtn.classList.remove('playing', 'loading');
    currentPlayBtn.querySelector('span').textContent = '▶';
    currentPlayBtn = null;
  }
  nowPlaying.classList.remove('visible');
}

npStop.addEventListener('click', stopAudio);

// ── Utilities ─────────────────────────────────────────────────────────────────
function formatBytes(b) {
  if (!b) return '';
  if (b < 1024) return `${b} B`;
  if (b < 1024 * 1024) return `${(b / 1024).toFixed(0)} KB`;
  return `${(b / (1024 * 1024)).toFixed(1)} MB`;
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

searchEl.addEventListener('input', render);
document.getElementById('btn-refresh').addEventListener('click', init);
init();
</script>
</body>
</html>
