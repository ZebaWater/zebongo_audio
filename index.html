<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeBongo Audio Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a0f;
  --bg-panel:  #111118;
  --bg-row:    #0f0f16;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.18);
  --text:      #e8e8f0;
  --text-dim:  rgba(232,232,240,0.45);
  --text-faint:rgba(232,232,240,0.22);
  --accent:    #FFE566;
  --accent-glow: rgba(255,229,102,0.25);
  --ok:        #88FF99;
  --err:       #FF4D6D;
  --lane-0: #FF4D6D; --lane-1: #FFB347; --lane-2: #4DC4FF; --lane-3: #B47DFF;
  --font-d: 'Black Ops One', cursive;
  --font-m: 'Share Tech Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font-m); -webkit-font-smoothing: antialiased;
}

/* ── Lane stripe bg ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,77,109,0.025)  0px,  rgba(255,77,109,0.025)  1px,  transparent 1px,  transparent 25%,
    rgba(255,179,71,0.025)  25%,  rgba(255,179,71,0.025)  calc(25% + 1px), transparent calc(25% + 1px), transparent 50%,
    rgba(77,196,255,0.025)  50%,  rgba(77,196,255,0.025)  calc(50% + 1px), transparent calc(50% + 1px), transparent 75%,
    rgba(180,125,255,0.025) 75%,  rgba(180,125,255,0.025) calc(75% + 1px), transparent calc(75% + 1px), transparent 100%
  );
}
body::after {
  content: '';
  position: fixed; bottom: 0; left: 0; right: 0; height: 35%;
  background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
  pointer-events: none; z-index: 0;
}

/* ── Layout ── */
.page {
  position: relative; z-index: 1;
  max-width: 860px; margin: 0 auto; padding: 0 20px 80px;
}

/* ── Header ── */
header {
  padding: 48px 0 36px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.logo {
  font-family: var(--font-d); font-size: 42px; letter-spacing: 3px;
  line-height: 1; margin-bottom: 4px;
}
.logo span { color: var(--accent); }
.logo-sub {
  font-size: 10px; letter-spacing: 4px; color: var(--text-dim);
  text-transform: uppercase; margin-bottom: 24px;
}
.header-meta {
  display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
}
.file-count {
  font-size: 11px; letter-spacing: 2px; color: var(--text-dim);
}
.file-count span { color: var(--accent); }
.search-wrap {
  flex: 1; min-width: 180px; max-width: 340px; position: relative;
}
.search-wrap::before {
  content: '⌕';
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 16px; pointer-events: none;
}
#search {
  width: 100%; height: 34px; padding: 0 10px 0 32px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font-m); font-size: 12px; outline: none;
  transition: border-color .15s;
}
#search:focus { border-color: var(--border-hi); }
#search::placeholder { color: var(--text-faint); }

.btn-refresh {
  height: 34px; padding: 0 14px;
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-family: var(--font-m); font-size: 11px;
  letter-spacing: 2px; cursor: pointer; transition: border-color .15s, color .15s;
  white-space: nowrap;
}
.btn-refresh:hover { border-color: var(--border-hi); color: var(--text); }

/* ── State messages ── */
.state-msg {
  display: flex; align-items: center; gap: 12px;
  padding: 40px 0; font-size: 12px; letter-spacing: 2px; color: var(--text-dim);
}
.state-msg.err { color: var(--err); }
.spinner {
  width: 16px; height: 16px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── File list ── */
#file-list { display: flex; flex-direction: column; gap: 2px; }

.file-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center; gap: 12px;
  padding: 11px 14px;
  background: var(--bg-row);
  border: 1px solid var(--border);
  transition: border-color .12s, background .12s;
  animation: rowIn .2s ease both;
}
.file-row:hover { border-color: var(--border-hi); background: rgba(255,255,255,0.02); }
@keyframes rowIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Lane-color left accent — cycles through 4 lane colors */
.file-row:nth-child(4n+1) { border-left: 2px solid var(--lane-0); }
.file-row:nth-child(4n+2) { border-left: 2px solid var(--lane-1); }
.file-row:nth-child(4n+3) { border-left: 2px solid var(--lane-2); }
.file-row:nth-child(4n+4) { border-left: 2px solid var(--lane-3); }

.file-name {
  font-size: 13px; letter-spacing: 0.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.file-name .ext { color: var(--text-faint); }

.file-size {
  font-size: 10px; letter-spacing: 1px; color: var(--text-faint);
  white-space: nowrap;
}

.copy-btn {
  height: 28px; padding: 0 12px;
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-family: var(--font-m); font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; white-space: nowrap;
  transition: background .12s, color .12s, border-color .12s;
  flex-shrink: 0;
}
.copy-btn:hover { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
.copy-btn.copied {
  background: var(--ok); color: #0a0a0f;
  border-color: var(--ok); pointer-events: none;
}

/* ── Empty / no-match ── */
.no-match {
  padding: 40px 0; font-size: 11px; letter-spacing: 3px;
  color: var(--text-faint); text-transform: uppercase;
}

/* ── Footer ── */
footer {
  margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border);
  font-size: 10px; letter-spacing: 2px; color: var(--text-faint);
}
footer a { color: var(--text-dim); text-decoration: none; }
footer a:hover { color: var(--accent); }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--bg-panel); border: 1px solid var(--border-hi);
  padding: 10px 20px; font-size: 11px; letter-spacing: 2px;
  color: var(--ok); opacity: 0; pointer-events: none;
  transition: opacity .2s, transform .2s;
  z-index: 100; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">Ze<span>Bongo</span></div>
    <div class="logo-sub">Audio Library</div>
    <div class="header-meta">
      <div class="file-count" id="count">Loading…</div>
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Filter tracks…" autocomplete="off">
      </div>
      <button class="btn-refresh" id="btn-refresh">↺ Refresh</button>
    </div>
  </header>

  <div id="status" class="state-msg">
    <div class="spinner"></div>
    <span>Fetching audio files…</span>
  </div>

  <div id="file-list"></div>

</div><!-- /page -->

<div id="toast">URL copied!</div>

<script>
const OWNER   = 'ZebaWater';
const REPO    = 'zebongo_audio';
const BRANCH  = 'main';   // change to 'master' if needed
const FOLDER  = 'audio';
const API_URL = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}?ref=${BRANCH}`;
const RAW_BASE = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${FOLDER}/`;

let allFiles = [];

const statusEl  = document.getElementById('status');
const listEl    = document.getElementById('file-list');
const countEl   = document.getElementById('count');
const searchEl  = document.getElementById('search');
const toast     = document.getElementById('toast');
let toastTimer;

async function fetchFiles() {
  statusEl.className = 'state-msg';
  statusEl.innerHTML = '<div class="spinner"></div><span>Fetching audio files…</span>';
  statusEl.style.display = 'flex';
  listEl.innerHTML = '';
  countEl.textContent = 'Loading…';

  try {
    const res = await fetch(API_URL);
    if (!res.ok) {
      // If 404 — the branch might be 'master'
      if (res.status === 404) throw new Error(`Folder not found. Check that /${FOLDER} exists on branch "${BRANCH}".`);
      throw new Error(`GitHub API error ${res.status}`);
    }
    const data = await res.json();
    allFiles = data
      .filter(f => f.type === 'file' && /\.mp3$/i.test(f.name))
      .sort((a, b) => a.name.localeCompare(b.name));

    statusEl.style.display = 'none';
    render(allFiles);
  } catch (e) {
    statusEl.className = 'state-msg err';
    statusEl.innerHTML = `<span>⚠ ${e.message}</span>`;
  }
}

function formatBytes(b) {
  if (!b) return '';
  if (b < 1024) return `${b} B`;
  if (b < 1024 * 1024) return `${(b / 1024).toFixed(0)} KB`;
  return `${(b / (1024 * 1024)).toFixed(1)} MB`;
}

function render(files) {
  const q = searchEl.value.trim().toLowerCase();
  const shown = q ? files.filter(f => f.name.toLowerCase().includes(q)) : files;

  countEl.innerHTML = `<span>${allFiles.length}</span> MP3${allFiles.length !== 1 ? 's' : ''}`;
  listEl.innerHTML = '';

  if (!shown.length) {
    listEl.innerHTML = `<div class="no-match">No tracks match "${esc(q)}"</div>`;
    return;
  }

  shown.forEach((f, i) => {
    const rawUrl  = RAW_BASE + encodeURIComponent(f.name);
    const nameNoExt = f.name.replace(/\.mp3$/i, '');
    const row = document.createElement('div');
    row.className = 'file-row';
    row.style.animationDelay = `${Math.min(i, 30) * 18}ms`;
    row.innerHTML = `
      <div class="file-name" title="${esc(f.name)}">${esc(nameNoExt)}<span class="ext">.mp3</span></div>
      <div class="file-size">${formatBytes(f.size)}</div>
      <button class="copy-btn" data-url="${esc(rawUrl)}">Copy URL</button>
    `;
    row.querySelector('.copy-btn').addEventListener('click', (e) => {
      const url = e.currentTarget.dataset.url;
      navigator.clipboard.writeText(url).then(() => {
        e.currentTarget.textContent = '✓ Copied';
        e.currentTarget.classList.add('copied');
        setTimeout(() => {
          e.currentTarget.textContent = 'Copy URL';
          e.currentTarget.classList.remove('copied');
        }, 1800);
        showToast('URL copied to clipboard');
      }).catch(() => {
        // Fallback for browsers without clipboard API
        prompt('Copy this URL:', url);
      });
    });
    listEl.appendChild(row);
  });
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

searchEl.addEventListener('input', () => render(allFiles));
document.getElementById('btn-refresh').addEventListener('click', fetchFiles);

fetchFiles();
</script>
</body>
</html>
